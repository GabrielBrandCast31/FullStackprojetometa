# Gateway nginx — junta backend FastAPI e frontend Node SSR no mesmo origin.
# Roteamento:
#   /api/*  -> backend:8000 (FastAPI)
#   /*      -> frontend:80  (Node SSR do TanStack Start)

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    # DNS interno do Docker — re-resolve hostnames a cada 10s. Sem isso, o nginx
    # cacheia o IP no boot e dá 502 quando backend/frontend reiniciam com IP novo.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ----- API FastAPI -----
    location /api/ {
        # Variável força o nginx a usar o resolver em runtime (re-resolução).
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 180s;
        proxy_send_timeout 60s;
    }

    # ----- Frontend (Node SSR) -----
    location / {
        set $frontend_upstream http://frontend:80;
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Streaming SSR — sem buffering pra evitar TTFB ruim.
        proxy_buffering off;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }
}
