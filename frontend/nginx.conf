# Config do nginx do container "frontend". Serve a SPA buildada e faz reverse
# proxy de /api -> servico "backend" (resolvido pela rede interna do Compose).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Tamanho generoso pro upload de imagem do anuncio (POST /api/campaign/create).
    client_max_body_size 20m;

    # ----- API -----
    # Chamadas /api/* sao reencaminhadas pro container backend.
    # Timeouts longos: /api/overview ate ~60s, /api/campaign/create ate ~40s.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 180s;
        proxy_send_timeout 60s;
    }

    # ----- Assets hashados (cache agressivo) -----
    # Vite gera nomes com hash (index-XXXX.js); seguro cachear "imutavel".
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ----- SPA -----
    # Qualquer outra rota cai no index.html para o React Router resolver
    # (/, /login, /register).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
